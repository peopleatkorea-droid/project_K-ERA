<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>K-ERA Desktop</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: #f4efe6;
        color: #15202b;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(199, 152, 92, 0.18), transparent 32%),
          linear-gradient(180deg, #f9f5ef 0%, #f2ece3 100%);
      }
      main {
        width: min(560px, calc(100vw - 2rem));
        padding: 2rem;
        border: 1px solid rgba(21, 32, 43, 0.08);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 60px rgba(21, 32, 43, 0.12);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.8rem;
      }
      p {
        margin: 0.5rem 0;
        line-height: 1.6;
      }
      code {
        font-family: "DM Mono", "Consolas", monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>K-ERA Desktop Shell</h1>
      <p id="status">Connecting to the local workspace UI...</p>
      <p>If the web UI is not running yet, start <code>npm run dev</code> in <code>frontend</code>.</p>
    </main>
    <script>
      const targetUrl = "http://127.0.0.1:3000/";
      const status = document.getElementById("status");
      async function connect() {
        try {
          await fetch(targetUrl, { mode: "no-cors" });
          window.location.replace(targetUrl);
        } catch (error) {
          if (status) {
            status.textContent = "Waiting for the local workspace UI on http://127.0.0.1:3000 ...";
          }
          window.setTimeout(connect, 1500);
        }
      }
      connect();
    </script>
  </body>
</html>

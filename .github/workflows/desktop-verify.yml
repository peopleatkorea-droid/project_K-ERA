name: desktop-verify

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "frontend/**"
      - "scripts/setup_local_node.ps1"
      - "pyproject.toml"
      - "uv.lock"
      - "requirements*.txt"
      - ".github/workflows/desktop-verify.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "frontend/**"
      - "scripts/setup_local_node.ps1"
      - "pyproject.toml"
      - "uv.lock"
      - "requirements*.txt"
      - ".github/workflows/desktop-verify.yml"

jobs:
  quality-gates:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Prepare local Python environment
        shell: pwsh
        run: .\scripts\setup_local_node.ps1 -PythonExe python -TorchProfile cpu

      - name: Verify web production build
        working-directory: frontend
        run: npm run build

      - name: Run frontend integration tests
        working-directory: frontend
        run: npm exec vitest run

      - name: Run backend test suite
        run: uv run pytest tests -q

  windows-desktop-smoke:
    needs: quality-gates
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Prepare local Python environment
        shell: pwsh
        run: .\scripts\setup_local_node.ps1 -PythonExe python -TorchProfile cpu

      - name: Run desktop smoke
        working-directory: frontend
        run: npm run desktop:smoke

      - name: Build packaged desktop installer
        working-directory: frontend
        run: npm run tauri:build

      - name: Verify packaged desktop installer
        working-directory: frontend
        run: npm run desktop:verify-package

      - name: Upload packaged desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kera-desktop-bundle
          path: |
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

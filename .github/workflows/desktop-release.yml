name: desktop-release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Prepare local Python environment
        shell: pwsh
        run: .\scripts\setup_local_node.ps1 -PythonExe python -TorchProfile cpu

      - name: Build packaged desktop installer
        working-directory: frontend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_KERA_CONTROL_PLANE_API_BASE_URL: https://kera-bay.vercel.app/control-plane/api
        run: npm run tauri:build

      - name: Verify packaged desktop installer
        working-directory: frontend
        run: npm run desktop:verify-package

      - name: Construct latest.json for auto-updater
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $nsisDir = "frontend/src-tauri/target/release/bundle/nsis"

          $exeFile = Get-ChildItem "$nsisDir" -Filter "*.exe" | Select-Object -First 1
          if (-not $exeFile) { throw "NSIS .exe not found" }

          $sigFile = Get-ChildItem "$nsisDir" -Filter "*.exe.zip.sig" | Select-Object -First 1
          if (-not $sigFile) { throw "Signature .sig not found" }

          $zipFile = Get-ChildItem "$nsisDir" -Filter "*.exe.zip" | Select-Object -First 1
          if (-not $zipFile) { throw "Zipped installer .zip not found" }

          $signature = Get-Content $sigFile.FullName -Raw

          $repo = "peopleatkorea-droid/project_K-ERA"
          $downloadUrl = "https://github.com/$repo/releases/download/v$version/$($zipFile.Name)"

          $latestJson = @{
            version  = $version
            notes    = "K-ERA Desktop v$version"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url       = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          Set-Content -Path "latest.json" -Value $latestJson -Encoding UTF8
          Write-Host "latest.json:"
          Get-Content "latest.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "K-ERA Desktop ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ !contains(github.ref_name, '-rc') }}
          files: |
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/nsis/*.exe.zip
            frontend/src-tauri/target/release/bundle/nsis/*.exe.zip.sig
            frontend/src-tauri/target/release/bundle/msi/*.msi
            latest.json

name: dependency-audits

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  dependency-audit:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Prepare local Python environment
        shell: pwsh
        run: .\scripts\setup_local_node.ps1 -PythonExe python -TorchProfile cpu

      - name: Run dependency audits
        shell: pwsh
        run: .\scripts\run_dependency_audits.ps1 -TorchProfile cpu

      - name: Upload dependency audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-reports
          path: artifacts/dependency-audit/**
          if-no-files-found: error
